name: GLM Coding Plan Warmup

on:
  schedule:
    - cron: '15 9 * * 1-5'  # UTC — edit this to your preferred schedule
  workflow_dispatch: {}

jobs:
  warmup:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping GLM to anchor 5-hour window
        env:
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
        run: |
          response=$(curl -s -w "\n%{http_code}" https://api.z.ai/api/coding/paas/v4/chat/completions \
            -H "Authorization: Bearer $ZAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"model":"GLM-4.5-Air","messages":[{"role":"user","content":"hi"}],"max_tokens":1}')

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 500 ]; then
            echo "✓ Warmup complete — 5-hour window anchored"
          else
            echo "⚠ Request returned HTTP $http_code — check your API key"
          fi
